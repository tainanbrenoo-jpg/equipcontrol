function renderUsers(){var us=state.usuarios;var h='<div class="flex wrap" style="margin-bottom:12px"><input id="us-search" placeholder="Buscar..." style="flex:1;min-width:160px" oninput="render()"><button class="btn" onclick="openUsrModal()">+ Novo</button></div>';var s=($("us-search")?$("us-search").value:"").toLowerCase(),fl=us.filter(function(u){return!s||u.nome.toLowerCase().indexOf(s)>=0||u.email.toLowerCase().indexOf(s)>=0});h+='<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr><th>Nome</th><th>E-mail</th><th class="hmob">Setor</th><th>Perfil</th><th></th></tr></thead><tbody>';fl.forEach(function(u){h+='<tr><td style="color:#e0e0e0;font-weight:500">'+u.nome+'</td><td style="color:#8888aa;font-size:12px">'+u.email+'</td><td class="hmob" style="color:#8888aa">'+(u.setor||"")+'</td><td><span style="color:'+(u.perfil==="admin"?"#818cf8":"#60a5fa")+';font-size:11px;font-weight:700;text-transform:uppercase">'+u.perfil+'</span></td><td><button style="background:none;border:none;color:#6b7280;cursor:pointer" onclick="openUsrModal(\''+u.id+'\')">Edit</button></td></tr>'});h+="</tbody></table></div></div>";return h;}
window._usrModal=null;function openUsrModal(id){var u=id?state.usuarios.find(function(x){return x.id===id}):null;window._usrModal=u?Object.assign({},u):{nome:"",cpf_ou_matricula:"",telefone:"",email:"",setor:"",perfil:"operador",status:"ativo",senha_hash:""};showUsrModal()}
function showUsrModal(){var f=window._usrModal,isEdit=!!f.id;var m='<div class="overlay" id="usr-overlay" onclick="if(event.target===this)closeUsrModal()"><div class="modal"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="margin:0;font-size:17px;color:#f0f0f0">'+(isEdit?"Editar":"Novo")+' Usuario</h2><button style="background:none;border:none;color:#888;cursor:pointer;font-size:18px" onclick="closeUsrModal()">X</button></div><div class="field"><label class="lbl">Nome *</label><input id="uf-nome" value="'+(f.nome||"")+'"></div><div class="g2"><div class="field"><label class="lbl">CPF/Matricula</label><input id="uf-cpf" value="'+(f.cpf_ou_matricula||"")+'"></div><div class="field"><label class="lbl">Telefone</label><input id="uf-tel" value="'+(f.telefone||"")+'"></div></div><div class="field"><label class="lbl">E-mail * (login)</label><input id="uf-email" value="'+(f.email||"")+'"></div><div class="field"><label class="lbl">Senha '+(isEdit?"(vazio = manter)":"*")+'</label><input id="uf-senha" type="password" placeholder="'+(isEdit?"Nova senha...":"Criar senha")+'"></div><div class="g2"><div class="field"><label class="lbl">Setor</label><input id="uf-setor" value="'+(f.setor||"")+'"></div><div class="field"><label class="lbl">Perfil</label><select id="uf-perfil"><option value="admin"'+(f.perfil==="admin"?" selected":"")+'>Admin</option><option value="operador"'+(f.perfil==="operador"?" selected":"")+'>Operador</option><option value="visualizador"'+(f.perfil==="visualizador"?" selected":"")+'>Visualizador</option></select></div></div><div class="flex" style="justify-content:flex-end;margin-top:12px"><button class="btn btn-s" onclick="closeUsrModal()">Cancelar</button><button class="btn" onclick="saveUsr()">Salvar</button></div></div></div>';document.body.insertAdjacentHTML("beforeend",m);}
function closeUsrModal(){var o=$("usr-overlay");if(o)o.remove()}
function saveUsr(){var f=window._usrModal,senha=$("uf-senha")?$("uf-senha").value:"",data={nome:$("uf-nome").value,cpf_ou_matricula:$("uf-cpf").value,telefone:$("uf-tel").value,email:$("uf-email").value,setor:$("uf-setor").value,perfil:$("uf-perfil").value,status:f.status||"ativo"};if(!data.nome||!data.email){toast("Preencha nome e e-mail","error");return}if(!f.id&&!senha){toast("Crie uma senha","error");return}if(senha)data.senha_hash=senha;if(f.id){api("usuarios?id=eq."+f.id,"PATCH",Object.assign(data,{updated_at:now()})).then(function(){return addLog("Edicao","usuarios",f.id,data.nome)}).then(function(){toast("Atualizado!");closeUsrModal();return loadAll()}).then(render).catch(function(e){toast("Erro: "+e.message,"error")})}else{api("usuarios","POST",Object.assign(data,{created_at:now()})).then(function(){return addLog("Cadastro","usuarios",null,data.nome)}).then(function(){toast("Cadastrado!");closeUsrModal();return loadAll()}).then(render).catch(function(e){toast("Erro: "+e.message,"error")})}}
function renderHist(){var mv=state.movs,us=state.usuarios;var h='<div class="flex wrap" style="margin-bottom:12px"><select id="hi-filter" style="width:auto;min-width:120px" onchange="render()"><option value="todos">Todos</option><option value="aberto">Em aberto</option><option value="parcial">Parcial</option><option value="concluida">Concluida</option></select><select id="hi-user" style="width:auto;min-width:140px" onchange="render()"><option value="">Todos usuarios</option>'+us.map(function(u){return '<option value="'+u.id+'">'+u.nome+'</option>'}).join("")+'</select><input id="hi-de" type="date" style="width:auto" placeholder="De" onchange="render()"><input id="hi-ate" type="date" style="width:auto" placeholder="Ate" onchange="render()"></div>';
var fs=$("hi-filter")?$("hi-filter").value:"todos",fu=$("hi-user")?$("hi-user").value:"",de=$("hi-de")?$("hi-de").value:"",ate=$("hi-ate")?$("hi-ate").value:"";
var fl=mv.filter(function(m){var ok=fs==="todos"||m.status===fs;if(fu)ok=ok&&m.responsavel_id===fu;if(de)ok=ok&&m.data_saida>=de;if(ate)ok=ok&&m.data_saida<=ate+"T23:59:59";return ok});
if(!fl.length){h+='<div class="card"><p style="color:#6b7280;font-size:13px;text-align:center">Nenhuma movimentacao</p></div>';return h}
fl.forEach(function(m){var r=us.find(function(u){return u.id===m.responsavel_id}),op=us.find(function(u){return u.id===m.operador_id}),mi=state.itens.filter(function(i){return i.movimentacao_id===m.id});h+='<div class="card" style="padding:0"><div style="padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="toggleHist(\''+m.id+'\')"><div><div style="font-weight:500;color:#e0e0e0;font-size:14px">'+(r?r.nome:"--")+' <span style="color:#6b7280;font-size:12px">'+mi.length+' item(ns)</span></div><div style="color:#6b7280;font-size:12px;margin-top:2px">Saida: '+fmtdt(m.data_saida)+(m.data_fechamento?" | Devol: "+fmtdt(m.data_fechamento):"")+(op?" | Op: "+op.nome.split(" ")[0]:"")+'</div></div>'+badge(m.status)+'</div><div id="hi-'+m.id+'" style="display:none;padding:0 14px 10px;border-top:1px solid #1a1a2e">';if(m.observacoes)h+='<p style="color:#8888aa;font-size:12px;margin-top:6px">Obs: '+m.observacoes+'</p>';mi.forEach(function(i){var eq=state.equipamentos.find(function(e){return e.id===i.equipamento_id});h+='<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #0a0a16"><span style="color:#e0e0e0">'+(eq?eq.nome:"?")+'  ('+(eq?eq.codigo_interno:"")+')</span><span style="color:'+(i.data_devolucao?"#34d399":"#f59e0b")+'">'+(i.data_devolucao?"Devolvido "+fmtd(i.data_devolucao):"Pendente")+'</span></div>'});h+="</div></div>"});return h;}
function toggleHist(id){var el=$("hi-"+id);if(el)el.style.display=el.style.display==="none"?"block":"none"}
emailjs.init(EJS_KEY);render();
</script>
