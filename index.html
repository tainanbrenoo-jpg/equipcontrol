<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a16;color:#e0e0e0;min-height:100vh}
a{color:#2563eb;text-decoration:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#2a2a40;border-radius:3px}
input,select,textarea{width:100%;padding:10px 12px;background:#1a1a2e;border:1px solid #2a2a40;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.2)}
button{font-family:inherit;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent}
button:active{opacity:.85;transform:scale(.98)}
.btn{padding:10px 18px;background:#2563eb;color:#fff;border-radius:8px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:6px}
.btn-s{background:#2a2a40;color:#c0c0d0}.btn-d{background:#7f1d1d;color:#fca5a5}.btn-g{background:#059669}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;display:inline-block}
.card{background:#12121f;border:1px solid #1a1a2e;border-radius:12px;padding:16px;margin-bottom:12px}
.lbl{display:block;margin-bottom:4px;color:#7a7a9a;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.field{margin-bottom:12px}
.flex{display:flex;gap:8px;align-items:center}.wrap{flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 10px;text-align:left;color:#6b7280;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid #1a1a2e}
td{padding:8px 10px;border-bottom:1px solid #0f0f1a}
.sidebar{width:220px;background:#0f0f1e;border-right:1px solid #1a1a2e;position:fixed;left:0;top:0;bottom:0;display:flex;flex-direction:column;z-index:100;transition:transform .25s}
.main-area{margin-left:220px;min-height:100vh}
.nav-btn{width:100%;display:flex;align-items:center;gap:8px;padding:9px 12px;margin-bottom:2px;background:transparent;border-radius:8px;color:#7a7a9a;font-size:13px;font-weight:500;text-align:left}
.nav-btn.act{background:#1a1a2e;color:#2563eb;border:1px solid #2a2a40}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:#12121f;border:1px solid #2a2a40;border-radius:14px;padding:20px;width:92%;max-width:520px;max-height:85vh;overflow-y:auto}
.modal-w{max-width:680px}
.toast{position:fixed;top:16px;right:16px;z-index:999;background:#12121f;padding:12px 18px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:8px;animation:si .3s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.loader{width:28px;height:28px;border:3px solid #1a1a2e;border-top-color:#2563eb;border-radius:50%;animation:sp .7s linear infinite;margin:40px auto}
.ddrop{position:absolute;top:100%;left:0;right:0;z-index:50;background:#1a1a2e;border:1px solid #2a2a40;border-radius:8px;margin-top:4px;max-height:180px;overflow-y:auto}
.ddrop button{width:100%;padding:8px 10px;background:none;border:none;border-bottom:1px solid #0f0f1a;color:#e0e0e0;font-size:13px;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.ddrop button:hover{background:#12121f}
.mob-btn{display:none;background:none;border:none;color:#7a7a9a;padding:4px}
@keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
.main-area{margin-left:0}.mob-btn{display:block!important}
.g2{grid-template-columns:1fr}.hmob{display:none!important}
.sgrid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ─── CONFIG ─────────────────────────────────
const SB="https://twbgcbwdqijhwrmrlpvw.supabase.co";
const SK="sb_secret_0PwWoIYM22geRCzSfNttaQ_cf3SFeok";
const H={"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json"};

async function api(path,method,body){
const opt={method:method||“GET”,headers:{…H}};
if(method===“POST”||method===“PATCH”)opt.headers[“Prefer”]=“return=representation”;
if(body)opt.body=JSON.stringify(body);
const r=await fetch(SB+”/rest/v1/”+path,opt);
if(!r.ok)throw new Error(await r.text());
const t=await r.text();return t?JSON.parse(t):[];
}

const $=id=>document.getElementById(id);
const now=()=>new Date().toISOString();
const fmtd=i=>{if(!i)return”—”;return new Date(i).toLocaleDateString(“pt-BR”)};
const fmtdt=i=>{if(!i)return”—”;const d=new Date(i);return d.toLocaleDateString(“pt-BR”)+” “+d.toLocaleTimeString(“pt-BR”,{hour:“2-digit”,minute:“2-digit”})};

const ST={disponivel:[”#0d3320”,”#34d399”,“Disponível”],emprestado:[”#3b2006”,”#f59e0b”,“Emprestado”],manutencao:[”#3b1006”,”#ef4444”,“Manutenção”],inativo:[”#1e1e2e”,”#6b7280”,“Inativo”],aberto:[”#3b2006”,”#f59e0b”,“Em aberto”],parcial:[”#1e2a3b”,”#60a5fa”,“Parcial”],concluida:[”#0d3320”,”#34d399”,“Concluída”],ativo:[”#0d3320”,”#34d399”,“Ativo”]};
function badge(s){const c=ST[s]||[”#333”,”#aaa”,s];return’<span class=“badge” style=“background:’+c[0]+”;color:”+c[1]+’”>’+c[2]+”</span>”}

// ─── STATE ──────────────────────────────────
let state={user:null,page:“dashboard”,usuarios:[],equipamentos:[],movs:[],itens:[],sideOpen:false};

function toast(msg,type){
const c={success:”#34d399”,error:”#ef4444”,info:”#60a5fa”}[type||“success”];
const icon={success:“✓”,error:“✕”,info:“ℹ”}[type||“success”];
const d=document.createElement(“div”);
d.className=“toast”;d.style.border=“1px solid “+c;
d.innerHTML=’<span style="color:'+c+';font-size:16px">’+icon+”</span> “+msg;
document.body.appendChild(d);
setTimeout(()=>d.remove(),3000);
}

async function loadAll(){
try{
const[u,e,m,i]=await Promise.all([api(“usuarios?select=*”),api(“equipamentos?select=*”),api(“movimentacoes?select=*&order=data_saida.desc”),api(“itens_movimentacao?select=*”)]);
state.usuarios=u;state.equipamentos=e;state.movs=m;state.itens=i;
}catch(err){toast(“Erro ao carregar: “+err.message,“error”)}
}

async function addLog(acao,ent,eid,det){
try{await api(“logs_auditoria”,“POST”,{usuario_id:state.user?.id,acao,entidade:ent,entidade_id:eid,detalhes:det,created_at:now()})}catch(e){}
}

// ─── RENDER ─────────────────────────────────
function render(){$(“root”).innerHTML=state.user?renderApp():renderLogin()}

function renderLogin(){
return`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center">

<div style="width:90%;max-width:360;animation:fi .4s">
<div style="text-align:center;margin-bottom:28px">
<div style="width:60px;height:60px;background:#1a1a2e;border:2px solid #2563eb;border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px">
<svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
</div>
<h1 style="color:#f0f0f0;font-size:22px;font-weight:700">EquipControl</h1>
<p style="color:#6b7280;font-size:11px;margin-top:4px;letter-spacing:2px">GESTÃO DE EQUIPAMENTOS</p>
<div style="margin-top:8px;padding:3px 12px;background:#0d3320;border-radius:20px;display:inline-block"><span style="color:#34d399;font-size:11px">● Online</span></div>
</div>
<div class="card">
<div class="field"><label class="lbl">E-mail</label><input id="login-email" value="admin@empresa.com"></div>
<div class="field"><label class="lbl">Senha</label><input id="login-pass" type="password" value="admin123"></div>
<button class="btn" style="width:100%;justify-content:center;margin-top:6px" onclick="doLogin()">Entrar</button>
<p style="color:#555;font-size:11px;text-align:center;margin-top:14px">Login: admin@empresa.com</p>
</div>
</div>
</div>`;
}

async function doLogin(){
const email=$(“login-email”).value;
try{
const u=await api(“usuarios?select=*&email=eq.”+encodeURIComponent(email)+”&status=eq.ativo”);
if(u&&u.length>0){state.user=u[0];await loadAll();render();toast(“Bem-vindo, “+u[0].nome.split(” “)[0]+”!”)}
else toast(“Usuário não encontrado”,“error”);
}catch(e){toast(“Erro: “+e.message,“error”)}
}

function nav(p){state.page=p;state.sideOpen=false;render()}

function renderApp(){
const u=state.user;const isA=u.perfil===“admin”;const isO=u.perfil===“operador”||isA;
const items=[{id:“dashboard”,l:“Dashboard”,ic:“⊞”},{id:“equipamentos”,l:“Equipamentos”,ic:“📦”}];
if(isO){items.push({id:“saida”,l:“Nova Saída”,ic:“↗”});items.push({id:“devolucao”,l:“Devolução”,ic:“↙”})}
if(isA)items.push({id:“usuarios”,l:“Usuários”,ic:“👥”});
items.push({id:“historico”,l:“Histórico”,ic:“⏱”});

const navH=items.map(i=>’<button class=“nav-btn ‘+(state.page===i.id?“act”:””)+’” onclick=“nav('’+i.id+’')”><span>’+i.ic+’</span> ‘+i.l+’</button>’).join(””);
const pageTitle=items.find(i=>i.id===state.page)?.l||“Dashboard”;

let content=””;
if(state.page===“dashboard”)content=renderDash();
else if(state.page===“equipamentos”)content=renderEquip();
else if(state.page===“saida”)content=renderSaida();
else if(state.page===“devolucao”)content=renderDevol();
else if(state.page===“usuarios”)content=renderUsers();
else if(state.page===“historico”)content=renderHist();

return`

<aside class="sidebar ${state.sideOpen?"open":""}" id="sidebar">
<div style="padding:14px;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;gap:8px">
<div style="width:32px;height:32px;background:#1a1a2e;border:1px solid #2563eb;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#2563eb;font-size:16px">📦</div>
<div><div style="font-weight:700;font-size:13px;color:#f0f0f0">EquipControl</div><div style="font-size:9px;color:#34d399">● Online</div></div>
</div>
<nav style="flex:1;padding:8px 6px">${navH}</nav>
<div style="padding:12px;border-top:1px solid #1a1a2e">
<div style="font-size:12px;color:#8888aa">${u.nome}</div>
<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:2px">${u.perfil}</div>
<button class="btn btn-s" style="width:100%;justify-content:center;padding:7px;font-size:12px;margin-top:8px" onclick="state.user=null;render()">Sair</button>
</div>
</aside>
<div class="main-area">
<div style="padding:10px 14px;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;gap:10px">
<button class="mob-btn" onclick="state.sideOpen=!state.sideOpen;render()">☰</button>
<h1 style="margin:0;font-size:17px;font-weight:600;color:#f0f0f0;flex:1">${pageTitle}</h1>
<button style="background:none;border:none;color:#555;cursor:pointer;font-size:16px" onclick="reloadData()" title="Atualizar">⟳</button>
</div>
<div style="padding:14px;max-width:1100;margin:0 auto;animation:fi .3s">${content}</div>
</div>
${state.sideOpen?'<div style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99" onclick="state.sideOpen=false;render()"></div>':""}`;
}

async function reloadData(){await loadAll();render();toast(“Atualizado!”)}

// ─── DASHBOARD ──────────────────────────────
function renderDash(){
const eq=state.equipamentos;const mv=state.movs;const it=state.itens;const us=state.usuarios;
const today=new Date().toDateString();
const pend=mv.filter(m=>m.status===“aberto”||m.status===“parcial”);
const stats=[
[“Total”,eq.length,”#2563eb”],[“Disponíveis”,eq.filter(e=>e.status===“disponivel”).length,”#34d399”],
[“Emprestados”,eq.filter(e=>e.status===“emprestado”).length,”#f59e0b”],[“Manutenção”,eq.filter(e=>e.status===“manutencao”).length,”#ef4444”],
[“Hoje”,mv.filter(m=>new Date(m.data_saida).toDateString()===today).length,”#818cf8”],[“Pendentes”,pend.length,”#f472b6”]
];
let h=’<div class="sgrid">’+stats.map(s=>’<div class="card"><div style="color:#6b7280;font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:6px">’+s[0]+’</div><div style="font-size:26px;font-weight:700;color:'+s[2]+';font-family:monospace">’+s[1]+’</div></div>’).join(””)+”</div>”;

if(pend.length>0){
h+=’<div class="card" style="border-color:#3b2006"><h3 style="margin:0 0 10px;font-size:14px;color:#f59e0b">⚠ Devoluções Pendentes</h3>’;
pend.slice(0,5).forEach(m=>{
const r=us.find(u=>u.id===m.responsavel_id);
const pc=it.filter(i=>i.movimentacao_id===m.id&&!i.data_devolucao).length;
h+=’<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1a1a2e;font-size:13px"><span style="color:#e0e0e0">’+(r?.nome||”—”)+’ <span style="color:#6b7280">· ‘+pc+’ item(ns) · ‘+fmtd(m.data_saida)+’</span></span>’+badge(m.status)+’</div>’;
});
h+=’<button class="btn" style="margin-top:10px;font-size:12px;padding:8px 14px" onclick="nav(\'devolucao\')">Ver devoluções</button></div>’;
}
return h;
}

// ─── EQUIPAMENTOS ───────────────────────────
function renderEquip(){
const isA=state.user?.perfil===“admin”;
const eq=state.equipamentos;
let h=’<div class="flex wrap" style="margin-bottom:12px"><input id="eq-search" placeholder="Buscar..." style="flex:1;min-width:160px" oninput="render()"><select id="eq-filter" style="width:auto;min-width:120px" onchange="render()"><option value="todos">Todos</option><option value="disponivel">Disponível</option><option value="emprestado">Emprestado</option><option value="manutencao">Manutenção</option><option value="inativo">Inativo</option></select>’;
if(isA)h+=’<button class="btn" onclick="openEqModal()">+ Novo</button>’;
h+=’</div>’;

const search=($(“eq-search”)?.value||””).toLowerCase();
const fs=$(“eq-filter”)?.value||“todos”;
const filtered=eq.filter(e=>{const ms=!search||[e.nome,e.codigo_interno,e.numero_serie,e.codigo_identificacao].some(f=>(f||””).toLowerCase().includes(search));return ms&&(fs===“todos”||e.status===fs)});

h+=’<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr><th>Código</th><th>Equipamento</th><th class="hmob">Categoria</th><th class="hmob">Local</th><th>Status</th><th></th></tr></thead><tbody>’;
if(filtered.length===0)h+=’<tr><td colspan="6" style="padding:20px;text-align:center;color:#555">Nenhum equipamento</td></tr>’;
filtered.forEach(e=>{
h+=’<tr><td style="color:#2563eb;font-family:monospace;font-size:12px">’+e.codigo_interno+’</td><td style="color:#e0e0e0;font-weight:500">’+e.nome+’</td><td class="hmob" style="color:#8888aa">’+(e.categoria||””)+’</td><td class="hmob" style="color:#8888aa">’+(e.localizacao_atual||””)+’</td><td>’+badge(e.status)+’</td><td><button style="background:none;border:none;color:#6b7280;cursor:pointer" onclick="openEqModal(\''+e.id+'\')">✎</button></td></tr>’;
});
h+=”</tbody></table></div></div>”;
return h;
}

window._eqModal=null;
function openEqModal(id){
const eq=id?state.equipamentos.find(e=>e.id===id):null;
window._eqModal=eq?{…eq}:{nome:””,categoria:“Informática”,codigo_interno:””,numero_serie:””,codigo_identificacao:””,tipo_codigo:“qr”,descricao:””,estado_conservacao:“Bom”,localizacao_atual:””,status:“disponivel”};
showEqModal();
}

function showEqModal(){
const f=window._eqModal;const isA=state.user?.perfil===“admin”;const isEdit=!!f.id;
let m=’<div class="overlay" id="eq-overlay" onclick="if(event.target===this)closeEqModal()"><div class="modal modal-w">’;
m+=’<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="margin:0;font-size:17px;color:#f0f0f0">’+(isEdit?“Editar”:“Novo”)+’ Equipamento</h2><button style="background:none;border:none;color:#888;cursor:pointer;font-size:18px" onclick="closeEqModal()">✕</button></div>’;
m+=’<div class="g2">’;
m+=’<div class="field"><label class="lbl">Nome *</label><input id=“ef-nome” value=”’+(f.nome||””)+’” ‘+(isA?””:“disabled”)+”></div>”;
m+=’<div class="field"><label class="lbl">Categoria</label><select id=“ef-cat” ‘+(isA?””:“disabled”)+”>”+[“Informática”,“Audiovisual”,“Ferramentas”,“Instrumentação”,“Veículos”,“Mobiliário”,“Outros”].map(c=>’<option’+(f.categoria===c?” selected”:””)+”>”+c+”</option>”).join(””)+”</select></div>”;
m+=’<div class="field"><label class="lbl">Código Interno *</label><input id=“ef-cod” value=”’+(f.codigo_interno||””)+’” ‘+(isA?””:“disabled”)+”></div>”;
m+=’<div class="field"><label class="lbl">Nº Série</label><input id=“ef-serie” value=”’+(f.numero_serie||””)+’” ‘+(isA?””:“disabled”)+”></div>”;
m+=’<div class="field"><label class="lbl">Código QR/Barras</label><input id=“ef-qr” value=”’+(f.codigo_identificacao||””)+’” ‘+(isA?””:“disabled”)+”></div>”;
m+=’<div class="field"><label class="lbl">Localização</label><input id=“ef-loc” value=”’+(f.localizacao_atual||””)+’” ‘+(isA?””:“disabled”)+”></div>”;
m+=’<div class="field"><label class="lbl">Conservação</label><select id=“ef-cons” ‘+(isA?””:“disabled”)+”>”+[“Excelente”,“Bom”,“Regular”,“Ruim”].map(c=>’<option’+(f.estado_conservacao===c?” selected”:””)+”>”+c+”</option>”).join(””)+”</select></div>”;
m+=’<div class="field"><label class="lbl">Status</label><select id=“ef-st” ‘+(isA?””:“disabled”)+”>”+[[“disponivel”,“Disponível”],[“emprestado”,“Emprestado”],[“manutencao”,“Manutenção”],[“inativo”,“Inativo”]].map(c=>’<option value=”’+c[0]+’”’+(f.status===c[0]?” selected”:””)+”>”+c[1]+”</option>”).join(””)+”</select></div>”;
m+=”</div>”;
m+=’<div class="field"><label class="lbl">Descrição</label><textarea id=“ef-desc” style=“height:45px;resize:vertical” ‘+(isA?””:“disabled”)+”>”+(f.descricao||””)+”</textarea></div>”;
if(isA){
m+=’<div class="flex" style="justify-content:flex-end;margin-top:12px">’;
if(isEdit)m+=’<button class="btn btn-d" onclick="deleteEq(\''+f.id+'\')">Excluir</button>’;
m+=’<button class="btn btn-s" onclick="closeEqModal()">Cancelar</button>’;
m+=’<button class="btn" onclick="saveEq()">Salvar</button></div>’;
}
m+=”</div></div>”;
document.body.insertAdjacentHTML(“beforeend”,m);
}

function closeEqModal(){const o=$(“eq-overlay”);if(o)o.remove()}

async function saveEq(){
const f=window._eqModal;
const data={nome:$(“ef-nome”).value,categoria:$(“ef-cat”).value,codigo_interno:$(“ef-cod”).value,numero_serie:$(“ef-serie”).value,codigo_identificacao:$(“ef-qr”).value||null,localizacao_atual:$(“ef-loc”).value,estado_conservacao:$(“ef-cons”).value,status:$(“ef-st”).value,descricao:$(“ef-desc”).value};
if(!data.nome||!data.codigo_interno){toast(“Preencha nome e código”,“error”);return}
try{
if(f.id){await api(“equipamentos?id=eq.”+f.id,“PATCH”,{…data,updated_at:now()});await addLog(“Edição”,“equipamentos”,f.id,data.nome)}
else{await api(“equipamentos”,“POST”,{…data,created_at:now()});await addLog(“Cadastro”,“equipamentos”,null,data.nome)}
toast(f.id?“Atualizado!”:“Cadastrado!”);closeEqModal();await loadAll();render();
}catch(e){toast(“Erro: “+e.message,“error”)}
}

async function deleteEq(id){
if(!confirm(“Tem certeza?”))return;
try{await api(“equipamentos?id=eq.”+id,“DELETE”);toast(“Removido”);closeEqModal();await loadAll();render()}catch(e){toast(“Erro: “+e.message,“error”)}
}

// ─── SAÍDA ──────────────────────────────────
window._saidaItems=[];
function renderSaida(){
const us=state.usuarios.filter(u=>u.status===“ativo”);
const items=window._saidaItems;
let h=’<div style="max-width:640px"><div class="card"><h3 style="margin:0 0 14px;font-size:15px;color:#f0f0f0">Registrar Saída</h3>’;
h+=’<div class="field"><label class="lbl">Responsável *</label><select id="sa-resp"><option value="">Selecione…</option>’+us.map(u=>’<option value="'+u.id+'">’+u.nome+” — “+(u.setor||””)+”</option>”).join(””)+”</select></div>”;
h+=’<div class="field"><label class="lbl">Previsão Devolução</label><input type="date" id="sa-data"></div>’;
h+=’<div class="field"><label class="lbl">Adicionar Equipamento</label><div style="position:relative"><div class="flex"><input id="sa-busca" placeholder="Código ou nome..." oninput="showSaidaDrop()" onfocus="showSaidaDrop()"><button class="btn" onclick="addSaidaItem()">🔍</button></div><div class="ddrop" id="sa-drop" style="display:none"></div></div></div>’;
if(items.length>0){
h+=’<label class="lbl" style="margin-top:8px">Selecionados (’+items.length+’)</label>’;
items.forEach((e,i)=>{
h+=’<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:#0d3320;border:1px solid #14532d;border-radius:8px;margin-bottom:5px"><span style="color:#34d399;font-weight:500;font-size:13px">’+e.nome+’ <span style="color:#6b7280;font-size:11px">’+e.codigo_interno+’</span></span><button style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px" onclick="rmSaidaItem('+i+')">✕</button></div>’;
});
}
h+=’<div class="field" style="margin-top:8px"><label class="lbl">Observações</label><textarea id="sa-obs" style="height:45px;resize:vertical" placeholder="Opcional..."></textarea></div>’;
h+=’<button class="btn" style="margin-top:6px" onclick="doSaida()">Registrar Saída</button>’;
h+=”</div></div>”;
return h;
}

function showSaidaDrop(){
const v=($(“sa-busca”)?.value||””).toLowerCase();
const avail=state.equipamentos.filter(e=>e.status===“disponivel”&&!window._saidaItems.find(i=>i.id===e.id));
if(v.length<1){$(“sa-drop”).style.display=“none”;return}
const list=avail.filter(e=>[e.nome,e.codigo_interno,e.numero_serie,e.codigo_identificacao].some(f=>(f||””).toLowerCase().includes(v))).slice(0,6);
if(list.length===0){$(“sa-drop”).style.display=“none”;return}
$(“sa-drop”).style.display=“block”;
$(“sa-drop”).innerHTML=list.map(e=>’<button onclick="pickSaidaItem(\''+e.id+'\')"><span>’+e.nome+’ <span style="color:#555;font-size:11px">(’+e.codigo_interno+’)</span></span>’+badge(e.status)+’</button>’).join(””);
}

function pickSaidaItem(id){
const eq=state.equipamentos.find(e=>e.id===id);
if(eq&&!window._saidaItems.find(i=>i.id===id)){window._saidaItems.push(eq);toast(eq.nome+” adicionado”)}
$(“sa-drop”).style.display=“none”;$(“sa-busca”).value=””;render();
}

function addSaidaItem(){
const v=($(“sa-busca”)?.value||””).trim();
const eq=state.equipamentos.find(e=>e.codigo_interno===v||e.codigo_identificacao===v||e.numero_serie===v);
if(eq&&eq.status===“disponivel”&&!window._saidaItems.find(i=>i.id===eq.id)){window._saidaItems.push(eq);toast(eq.nome+” adicionado”);$(“sa-busca”).value=””;render()}
}

function rmSaidaItem(i){window._saidaItems.splice(i,1);render()}

async function doSaida(){
const rid=$(“sa-resp”)?.value;const dp=$(“sa-data”)?.value;const obs=$(“sa-obs”)?.value||””;
if(!rid){toast(“Selecione responsável”,“error”);return}
if(window._saidaItems.length===0){toast(“Adicione equipamentos”,“error”);return}
try{
const mr=await api(“movimentacoes”,“POST”,{tipo:“saida”,responsavel_id:rid,operador_id:state.user.id,data_saida:now(),data_prevista_devolucao:dp||null,status:“aberto”,observacoes:obs});
const mid=mr[0]?.id;
if(mid){
for(const e of window._saidaItems){
await api(“itens_movimentacao”,“POST”,{movimentacao_id:mid,equipamento_id:e.id,data_saida:now(),status_item:“emprestado”});
await api(“equipamentos?id=eq.”+e.id,“PATCH”,{status:“emprestado”,updated_at:now()});
}
await addLog(“Saída”,“movimentacoes”,mid,window._saidaItems.length+” item(ns)”);
toast(“Saída registrada com “+window._saidaItems.length+” equipamento(s)!”);
window._saidaItems=[];await loadAll();render();
}
}catch(e){toast(“Erro: “+e.message,“error”)}
}

// ─── DEVOLUÇÃO ──────────────────────────────
window._selMov=null;
function renderDevol(){
if(window._selMov)return renderDevolDetail();
const pend=state.movs.filter(m=>m.status===“aberto”||m.status===“parcial”);
let h=’<div style="max-width:640px"><div class="card"><h3 style="margin:0 0 12px;font-size:15px;color:#f0f0f0">Pendentes</h3>’;
if(pend.length===0)h+=’<p style="color:#6b7280;font-size:13px">Nenhuma pendência.</p>’;
pend.forEach(m=>{
const r=state.usuarios.find(u=>u.id===m.responsavel_id);
const mi=state.itens.filter(i=>i.movimentacao_id===m.id);
const pc=mi.filter(i=>!i.data_devolucao).length;
h+=’<div style="padding:10px;background:#0a0a16;border:1px solid #1a1a2e;border-radius:10px;margin-bottom:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="window._selMov=\''+m.id+'\';render()"><div><div style="font-weight:500;color:#e0e0e0;font-size:14px">’+(r?.nome||”—”)+’</div><div style="color:#6b7280;font-size:12px;margin-top:2px">Saída: ‘+fmtd(m.data_saida)+’ · ‘+pc+’/’+mi.length+’ pendente(s)</div></div>’+badge(m.status)+’</div>’;
});
h+=”</div></div>”;return h;
}

function renderDevolDetail(){
const m=state.movs.find(x=>x.id===window._selMov);if(!m){window._selMov=null;return renderDevol()}
const r=state.usuarios.find(u=>u.id===m.responsavel_id);
const mi=state.itens.filter(i=>i.movimentacao_id===m.id);
let h=’<div style="max-width:640px"><button class="btn btn-s" style="margin-bottom:12px;font-size:12px" onclick="window._selMov=null;render()">← Voltar</button>’;
h+=’<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:12px"><h3 style="margin:0;font-size:15px;color:#f0f0f0">Devolução</h3>’+badge(m.status)+’</div>’;
h+=’<p style="font-size:13px;color:#8888aa;margin-bottom:12px">Resp: <strong style="color:#e0e0e0">’+(r?.nome||”—”)+’</strong> · Saída: ‘+fmtdt(m.data_saida)+’</p>’;
h+=’<label class="lbl">Itens</label>’;
mi.forEach(i=>{
const eq=state.equipamentos.find(e=>e.id===i.equipamento_id);const ret=!!i.data_devolucao;
h+=’<div style=“display:flex;align-items:center;justify-content:space-between;padding:9px 10px;background:’+(ret?”#0d332044”:”#1a1a2e”)+”;border:1px solid “+(ret?”#14532d”:”#2a2a40”)+’;border-radius:8px;margin-bottom:5px”><div><span style=“color:’+(ret?”#34d399”:”#e0e0e0”)+’;font-weight:500;font-size:13px”>’+(eq?.nome||”?”)+’</span><span style="color:#6b7280;font-size:11px;margin-left:6px">’+(eq?.codigo_interno||””)+”</span>”+(ret?’<span style="color:#34d399;font-size:11px;margin-left:6px">✓ ‘+fmtd(i.data_devolucao)+”</span>”:””)+”</div>”;
if(!ret)h+=’<button class="btn" style="padding:5px 10px;font-size:12px" onclick="devolverItem(\''+i.id+'\')">Devolver</button>’;
h+=”</div>”;
});
h+=’<div class="field" style="margin-top:8px"><label class="lbl">Observações</label><textarea id="dev-obs" style="height:40px;resize:vertical" placeholder="Avarias..."></textarea></div>’;
if(mi.some(i=>!i.data_devolucao))h+=’<button class="btn btn-g" style="margin-top:6px" onclick="devolverTudo(\''+m.id+'\')">✓ Devolver Todos</button>’;
h+=”</div></div>”;return h;
}

async function devolverItem(iid){
try{
const item=state.itens.find(i=>i.id===iid);const obs=$(“dev-obs”)?.value||””;
await api(“itens_movimentacao?id=eq.”+iid,“PATCH”,{data_devolucao:now(),status_item:“devolvido”,observacao_item:obs});
await api(“equipamentos?id=eq.”+item.equipamento_id,“PATCH”,{status:“disponivel”,updated_at:now()});
const mi=state.itens.filter(i=>i.movimentacao_id===item.movimentacao_id);
const allRet=mi.filter(i=>i.id!==iid).every(i=>i.data_devolucao);
const ns=allRet?“concluida”:“parcial”;const ud={status:ns};if(ns===“concluida”)ud.data_fechamento=now();
await api(“movimentacoes?id=eq.”+item.movimentacao_id,“PATCH”,ud);
await addLog(“Devolução”,“itens”,iid,””);toast(“Devolvido!”);
await loadAll();if(ns===“concluida”)window._selMov=null;render();
}catch(e){toast(“Erro: “+e.message,“error”)}
}

async function devolverTudo(mid){
try{
const obs=$(“dev-obs”)?.value||””;
const items=state.itens.filter(i=>i.movimentacao_id===mid&&!i.data_devolucao);
for(const i of items){
await api(“itens_movimentacao?id=eq.”+i.id,“PATCH”,{data_devolucao:now(),status_item:“devolvido”,observacao_item:obs});
await api(“equipamentos?id=eq.”+i.equipamento_id,“PATCH”,{status:“disponivel”,updated_at:now()});
}
await api(“movimentacoes?id=eq.”+mid,“PATCH”,{status:“concluida”,data_fechamento:now()});
await addLog(“Devolução total”,“movimentacoes”,mid,””);toast(“Todos devolvidos!”);
window._selMov=null;await loadAll();render();
}catch(e){toast(“Erro: “+e.message,“error”)}
}

// ─── USUÁRIOS ───────────────────────────────
function renderUsers(){
const us=state.usuarios;
let h=’<div class="flex wrap" style="margin-bottom:12px"><input id="us-search" placeholder="Buscar..." style="flex:1;min-width:160px" oninput="render()"><button class="btn" onclick="openUsrModal()">+ Novo</button></div>’;
const search=($(“us-search”)?.value||””).toLowerCase();
const filtered=us.filter(u=>!search||u.nome.toLowerCase().includes(search)||u.email.toLowerCase().includes(search));
h+=’<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr><th>Nome</th><th>E-mail</th><th class="hmob">Setor</th><th>Perfil</th><th>Status</th><th></th></tr></thead><tbody>’;
filtered.forEach(u=>{
h+=’<tr><td style="color:#e0e0e0;font-weight:500">’+u.nome+’</td><td style="color:#8888aa;font-size:12px">’+u.email+’</td><td class="hmob" style="color:#8888aa">’+(u.setor||””)+’</td><td><span style=“color:’+(u.perfil===“admin”?”#818cf8”:”#60a5fa”)+’;font-size:11px;font-weight:700;text-transform:uppercase”>’+u.perfil+’</span></td><td>’+badge(u.status===“ativo”?“ativo”:“inativo”)+’</td><td><button style="background:none;border:none;color:#6b7280;cursor:pointer" onclick="openUsrModal(\''+u.id+'\')">✎</button></td></tr>’;
});
h+=”</tbody></table></div></div>”;return h;
}

window._usrModal=null;
function openUsrModal(id){
const u=id?state.usuarios.find(x=>x.id===id):null;
window._usrModal=u?{…u}:{nome:””,cpf_ou_matricula:””,telefone:””,email:””,setor:””,perfil:“operador”,status:“ativo”};
showUsrModal();
}

function showUsrModal(){
const f=window._usrModal;const isEdit=!!f.id;
let m=’<div class="overlay" id="usr-overlay" onclick="if(event.target===this)closeUsrModal()"><div class="modal">’;
m+=’<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h2 style="margin:0;font-size:17px;color:#f0f0f0">’+(isEdit?“Editar”:“Novo”)+’ Usuário</h2><button style="background:none;border:none;color:#888;cursor:pointer;font-size:18px" onclick="closeUsrModal()">✕</button></div>’;
m+=’<div class="field"><label class="lbl">Nome *</label><input id=“uf-nome” value=”’+(f.nome||””)+’”></div>’;
m+=’<div class="g2"><div class="field"><label class="lbl">CPF/Matrícula</label><input id=“uf-cpf” value=”’+(f.cpf_ou_matricula||””)+’”></div><div class="field"><label class="lbl">Telefone</label><input id=“uf-tel” value=”’+(f.telefone||””)+’”></div></div>’;
m+=’<div class="field"><label class="lbl">E-mail *</label><input id=“uf-email” value=”’+(f.email||””)+’”></div>’;
m+=’<div class="g2"><div class="field"><label class="lbl">Setor</label><input id=“uf-setor” value=”’+(f.setor||””)+’”></div><div class="field"><label class="lbl">Perfil</label><select id="uf-perfil">’+[[“admin”,“Admin”],[“operador”,“Operador”],[“visualizador”,“Visualizador”]].map(c=>’<option value=”’+c[0]+’”’+(f.perfil===c[0]?” selected”:””)+”>”+c[1]+”</option>”).join(””)+”</select></div></div>”;
m+=’<div class="flex" style="justify-content:flex-end;margin-top:12px"><button class="btn btn-s" onclick="closeUsrModal()">Cancelar</button><button class="btn" onclick="saveUsr()">Salvar</button></div>’;
m+=”</div></div>”;
document.body.insertAdjacentHTML(“beforeend”,m);
}

function closeUsrModal(){const o=$(“usr-overlay”);if(o)o.remove()}

async function saveUsr(){
const f=window._usrModal;
const data={nome:$(“uf-nome”).value,cpf_ou_matricula:$(“uf-cpf”).value,telefone:$(“uf-tel”).value,email:$(“uf-email”).value,setor:$(“uf-setor”).value,perfil:$(“uf-perfil”).value,status:f.status||“ativo”};
if(!data.nome||!data.email){toast(“Preencha nome e e-mail”,“error”);return}
try{
if(f.id){await api(“usuarios?id=eq.”+f.id,“PATCH”,{…data,updated_at:now()});await addLog(“Edição”,“usuarios”,f.id,data.nome)}
else{await api(“usuarios”,“POST”,{…data,senha_hash:”$2a$10$92IXUNpkjO0rOQ5byMi.Ye4oKoEa3Ro9llC/.og/at2.uheWG/igi”,created_at:now()});await addLog(“Cadastro”,“usuarios”,null,data.nome)}
toast(f.id?“Atualizado!”:“Cadastrado!”);closeUsrModal();await loadAll();render();
}catch(e){toast(“Erro: “+e.message,“error”)}
}

// ─── HISTÓRICO ──────────────────────────────
function renderHist(){
const mv=state.movs;
let h=’<div class="flex" style="margin-bottom:12px"><select id="hi-filter" style="width:auto;min-width:120px" onchange="render()"><option value="todos">Todos</option><option value="aberto">Em aberto</option><option value="parcial">Parcial</option><option value="concluida">Concluída</option></select></div>’;
const fs=$(“hi-filter”)?.value||“todos”;
const filtered=mv.filter(m=>fs===“todos”||m.status===fs);
if(filtered.length===0){h+=’<div class="card"><p style="color:#6b7280;font-size:13px;text-align:center">Nenhuma movimentação</p></div>’;return h}
filtered.forEach(m=>{
const r=state.usuarios.find(u=>u.id===m.responsavel_id);
const op=state.usuarios.find(u=>u.id===m.operador_id);
const mi=state.itens.filter(i=>i.movimentacao_id===m.id);
h+=’<div class="card" style="padding:0"><div style="padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="toggleHist(\''+m.id+'\')">’;
h+=’<div><div style="font-weight:500;color:#e0e0e0;font-size:14px">’+(r?.nome||”—”)+’ <span style="color:#6b7280;font-size:12px">· ‘+mi.length+’ item(ns)</span></div>’;
h+=’<div style="color:#6b7280;font-size:12px;margin-top:2px">Saída: ‘+fmtdt(m.data_saida)+(m.data_fechamento?” · Fech: “+fmtdt(m.data_fechamento):””)+(op?” · Op: “+op.nome.split(” “)[0]:””)+’</div></div>’+badge(m.status)+’</div>’;
h+=’<div id="hi-'+m.id+'" style="display:none;padding:0 14px 10px;border-top:1px solid #1a1a2e">’;
if(m.observacoes)h+=’<p style="color:#8888aa;font-size:12px;margin-top:6px">Obs: ‘+m.observacoes+’</p>’;
mi.forEach(i=>{
const eq=state.equipamentos.find(e=>e.id===i.equipamento_id);
h+=’<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #0a0a16"><span style="color:#e0e0e0">’+(eq?.nome||”?”)+’ <span style="color:#555">(’+(eq?.codigo_interno||””)+’)</span></span><span style=“color:’+(i.data_devolucao?”#34d399”:”#f59e0b”)+’”>’+(i.data_devolucao?“Devolvido “+fmtd(i.data_devolucao):“Pendente”)+’</span></div>’;
});
h+=”</div></div>”;
});
return h;
}

function toggleHist(id){const el=$(“hi-”+id);if(el)el.style.display=el.style.display===“none”?“block”:“none”}

// ─── INIT ───────────────────────────────────
render();
</script>
