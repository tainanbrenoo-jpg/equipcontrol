<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');

:root {
  --ac: #C8102E;
  --ac2: #8B0000;
  --ac3: #E8314F;
  --acg: rgba(200,16,46,0.22);
  --acs: rgba(200,16,46,0.10);
  --bg0: #0f0f0f;
  --bg1: #171717;
  --bg2: #1e1e1e;
  --bg3: #252525;
  --bd: #2a2a2a;
  --bdf: rgba(200,16,46,0.45);
  --t1: #f2f2f2;
  --t2: #b0b0b0;
  --t3: #666;
  --green: #22c55e; --greenbg: rgba(34,197,94,.10); --greenbr: rgba(34,197,94,.25);
  --amber: #f59e0b; --amberbg: rgba(245,158,11,.10); --amberbr: rgba(245,158,11,.25);
  --red: #ef4444;   --redbg: rgba(239,68,68,.10);    --redbr: rgba(239,68,68,.25);
  --blue: #3b82f6;  --bluebg: rgba(59,130,246,.10);  --bluebr: rgba(59,130,246,.25);
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg0)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--ac)}

input,select,textarea{width:100%;padding:10px 13px;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;color:var(--t1);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;-webkit-appearance:none;transition:border-color .18s,box-shadow .18s}
input:focus,select:focus,textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acg)}
input::placeholder,textarea::placeholder{color:var(--t3)}
select option{background:var(--bg2);color:var(--t1)}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;-webkit-tap-highlight-color:transparent;transition:all .18s}
button:active{opacity:.85;transform:scale(.98)}

/* ── BOTÕES ── */
.btn{padding:9px 18px;background:var(--ac);color:#fff;border-radius:10px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;box-shadow:0 3px 14px var(--acg)}
.btn:hover{background:var(--ac3);transform:translateY(-1px)}
.btn:disabled{opacity:.5;pointer-events:none;transform:none}
.btn-s{background:var(--bg3);color:var(--t2);border:1px solid var(--bd);box-shadow:none}
.btn-s:hover{background:var(--bg2);color:var(--t1);border-color:var(--bdf)}
.btn-d{background:var(--redbg);color:var(--red);border:1px solid var(--redbr);box-shadow:none}
.btn-d:hover{background:rgba(239,68,68,.2)}
.btn-g{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbr);box-shadow:none}
.btn-g:hover{background:rgba(34,197,94,.2)}
.btn-cam{background:var(--bg3);color:var(--t2);border:1px solid var(--bd);box-shadow:none}
.btn-cam:hover{border-color:var(--bdf);color:var(--ac3)}
.btn-w{background:var(--amberbg);color:var(--amber);border:1px solid var(--amberbr);box-shadow:none}
.btn-w:hover{background:rgba(245,158,11,.2)}

/* ── BADGES ── */
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:12px}
.card:hover{border-color:rgba(200,16,46,.2)}

/* ── FORM ── */
.lbl{display:block;margin-bottom:5px;color:var(--t2);font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.field{margin-bottom:13px}
.flex{display:flex;gap:8px;align-items:center}.wrap{flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}

/* ── TABELA ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;color:var(--t3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;border-bottom:1px solid var(--bd);background:var(--bg1)}
td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t2)}
tbody tr:hover td{background:var(--bg3);color:var(--t1)}
tbody tr:last-child td{border-bottom:none}

/* ── SIDEBAR ── */
.sidebar{width:230px;background:var(--bg1);border-right:1px solid var(--bd);position:fixed;left:0;top:0;bottom:0;display:flex;flex-direction:column;z-index:100;transition:transform .25s}
.main-area{margin-left:230px;min-height:100vh}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--bd)}
.sidebar-logo-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;color:var(--t1)}
.sidebar-logo-name::before{content:'';display:inline-block;width:10px;height:10px;background:var(--ac);border-radius:3px;box-shadow:0 0 12px var(--acg);flex-shrink:0}
.sidebar-logo-sub{font-size:10px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:3px;padding-left:18px}
.sidebar-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nav-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;color:var(--t3);font-size:13px;font-weight:500;text-align:left;background:transparent;border:1px solid transparent;transition:all .18s}
.nav-btn:hover{background:var(--bg3);color:var(--t1)}
.nav-btn.act{background:var(--acs);color:var(--t1);border-color:var(--bdf)}
.nav-btn.act .nav-ic{color:var(--ac3)}
.nav-ic{width:20px;text-align:center;font-size:15px;flex-shrink:0}
.sidebar-foot{padding:12px 14px;border-top:1px solid var(--bd)}
.sidebar-user-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sidebar-avatar{width:34px;height:34px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;border:2px solid var(--bd)}
.sidebar-avatar img{width:100%;height:100%;object-fit:cover}
.sidebar-uname{font-size:13px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-urole{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}

/* ── TOPBAR ── */
.topbar{padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:var(--bg1);position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--t1);flex:1}
.mob-btn{display:none;background:none;border:none;color:var(--t3);padding:4px;font-size:20px}

/* ── OVERLAY / MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:16px}
.modal{background:var(--bg1);border:1px solid var(--bd);border-radius:18px;padding:22px;width:92%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-w{max-width:680px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--bd)}
.modal-ttl{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--t1)}
.modal-cls{width:28px;height:28px;border-radius:8px;background:var(--bg3);border:1px solid var(--bd);color:var(--t3);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .18s}
.modal-cls:hover{color:var(--red);background:var(--redbg);border-color:var(--redbr)}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;z-index:999;background:var(--bg2);border:1px solid var(--bd);padding:11px 18px;border-radius:12px;font-size:13px;display:flex;align-items:center;gap:8px;animation:si .3s;box-shadow:0 8px 28px rgba(0,0,0,.5);max-width:300px}

/* ── STATS GRID ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;transition:border-color .2s}
.stat-card:hover{border-color:var(--bdf)}
.stat-card.feat{background:var(--acs);border-color:var(--bdf)}
.stat-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:8px}
.stat-val{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--t1);line-height:1}
.stat-sub{margin-top:6px}

/* ── SECAO TITLE ── */
.sec-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ── DROPDOWN ── */
.ddrop{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--bg2);border:1px solid var(--bd);border-radius:10px;margin-top:4px;max-height:190px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.ddrop button{width:100%;padding:9px 12px;background:none;border:none;border-bottom:1px solid rgba(255,255,255,.04);color:var(--t1);font-size:13px;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.ddrop button:hover{background:var(--bg3)}
.ddrop button:last-child{border-bottom:none}

/* ── SCAN OK ── */
.scan-ok{background:var(--greenbg);border:1px solid var(--greenbr);border-radius:10px;padding:9px 12px;margin:6px 0;display:flex;align-items:center;justify-content:space-between;animation:si .3s}

/* ── FOTOS ── */
.foto-thumb{width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid var(--bd);cursor:pointer;transition:transform .18s}
.foto-thumb:hover{transform:scale(1.05)}
.foto-preview{max-width:100%;max-height:200px;border-radius:10px;border:2px solid var(--ac)}
.foto-grid{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* ── AVATAR UPLOAD ── */
.avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px}
.avatar-big{width:80px;height:80px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#fff;overflow:hidden;border:3px solid var(--bd);cursor:pointer;position:relative;transition:border-color .2s}
.avatar-big:hover{border-color:var(--ac)}
.avatar-big img{width:100%;height:100%;object-fit:cover}
.avatar-edit-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:22px}
.avatar-big:hover .avatar-edit-ov{opacity:1}
.avatar-hint{font-size:11px;color:var(--t3);text-align:center}

/* ── QR ── */
.qr-label{background:#fff;padding:16px;border-radius:10px;text-align:center;display:inline-block}
.qr-label h4{color:#111;margin:8px 0 2px;font-size:13px;font-family:'Syne',sans-serif;font-weight:700}
.qr-label p{color:#333;font-size:11px;font-family:monospace}

/* ── PAINEL DE CORES ── */
.color-panel{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:16px}
.color-panel-ttl{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:16px;color:var(--t1)}
.color-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.color-item-lbl{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.color-row{display:flex;align-items:center;gap:10px;background:var(--bg0);border:1px solid var(--bd);border-radius:10px;padding:6px 12px}
.color-swatch{width:26px;height:26px;border-radius:7px;border:none;cursor:pointer;padding:0;background:transparent;-webkit-appearance:none;flex-shrink:0}
.color-swatch::-webkit-color-swatch-wrapper{padding:0}
.color-swatch::-webkit-color-swatch{border:none;border-radius:6px}
.color-hex{background:transparent;border:none;color:var(--t1);font-family:monospace;font-size:13px;width:78px;outline:none;text-transform:uppercase}
.preset-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.preset-btn{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:10px;border:1px solid var(--bd);background:var(--bg0);color:var(--t2);font-size:12px;cursor:pointer;transition:all .18s}
.preset-btn:hover{border-color:var(--bdf);color:var(--t1)}
.preset-dot{width:12px;height:12px;border-radius:4px;flex-shrink:0}
.color-actions{display:flex;gap:8px;justify-content:flex-end}

/* ── ANIMATIONS ── */
@keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-area{margin-left:0}
  .mob-btn{display:block!important}
  .g2{grid-template-columns:1fr}
  .hmob{display:none!important}
  .sgrid{grid-template-columns:repeat(2,1fr)}
  .color-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
var SB="https://twbgcbwdqijhwrmrlpvw.supabase.co",SK="sb_publishable_EX0ZIMc11ldlcgcyvsBfZg_sZEhddi7",H={"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json"};
var EJS_SVC="service_au1prwk",EJS_TPL="template_43v1pfl",EJS_KEY="etjmjGryYxvWsyy9J";

function api(p,m,b){var o={method:m||"GET",headers:Object.assign({},H)};if(m==="POST"||m==="PATCH")o.headers["Prefer"]="return=representation";if(b)o.body=JSON.stringify(b);return fetch(SB+"/rest/v1/"+p,o).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error(t)});return r.text().then(function(t){return t?JSON.parse(t):[]})});}
function $(id){return document.getElementById(id)}
function now(){return new Date().toISOString()}
function fmtd(i){if(!i)return"--";return new Date(i).toLocaleDateString("pt-BR")}
function fmtdt(i){if(!i)return"--";var d=new Date(i);return d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})}

var ST={
  disponivel:  {bg:"var(--greenbg)", c:"var(--green)",  br:"var(--greenbr)", l:"Disponivel"},
  emprestado:  {bg:"var(--acs)",     c:"var(--ac3)",    br:"var(--bdf)",     l:"Emprestado"},
  manutencao:  {bg:"var(--amberbg)", c:"var(--amber)",  br:"var(--amberbr)", l:"Manutencao"},
  inativo:     {bg:"rgba(255,255,255,.05)", c:"var(--t3)", br:"var(--bd)", l:"Inativo"},
  aberto:      {bg:"var(--bluebg)", c:"var(--blue)",   br:"var(--bluebr)", l:"Em aberto"},
  parcial:     {bg:"var(--amberbg)", c:"var(--amber)",  br:"var(--amberbr)", l:"Parcial"},
  concluida:   {bg:"var(--greenbg)", c:"var(--green)",  br:"var(--greenbr)", l:"Concluida"},
  ativo:       {bg:"var(--greenbg)", c:"var(--green)",  br:"var(--greenbr)", l:"Ativo"},
  atrasado:    {bg:"var(--redbg)",   c:"var(--red)",    br:"var(--redbr)",   l:"Atrasado"}
};
function badge(s){var c=ST[s]||{bg:"rgba(255,255,255,.05)",c:"var(--t3)",br:"var(--bd)",l:s};return '<span class="badge" style="background:'+c.bg+';color:'+c.c+';border:1px solid '+c.br+'">'+c.l+"</span>"}

var state={user:null,page:"dashboard",usuarios:[],equipamentos:[],movs:[],itens:[],sideOpen:false};
var _busy=false;

function toast(m,t){
  var cols={success:"var(--green)",error:"var(--red)",info:"var(--blue)"};
  var c=cols[t||"success"]||cols.success;
  var ic={success:"✓",error:"✕",info:"i"}[t||"success"]||"✓";
  var d=document.createElement("div");
  d.className="toast";
  d.style.borderLeft="3px solid "+c;
  d.innerHTML='<span style="color:'+c+';font-weight:700;font-size:15px">'+ic+"</span> "+m;
  document.body.appendChild(d);
  setTimeout(function(){d.remove()},3200);
}

function loadAll(){return Promise.all([api("usuarios?select=*"),api("equipamentos?select=*"),api("movimentacoes?select=*&order=data_saida.desc"),api("itens_movimentacao?select=*")]).then(function(r){state.usuarios=r[0];state.equipamentos=r[1];state.movs=r[2];state.itens=r[3]}).catch(function(e){toast("Erro: "+e.message,"error")});}
function addLog(a,e,eid,d){return api("logs_auditoria","POST",{usuario_id:state.user?state.user.id:null,acao:a,entidade:e,entidade_id:eid,detalhes:d,created_at:now()}).catch(function(){});}
function render(){$("root").innerHTML=state.user?renderApp():renderLogin();stopCam();loadSavedColors();}
var camScanner=null;
function stopCam(){try{if(camScanner){camScanner.stop().catch(function(){});camScanner=null}}catch(e){}}
function startCam(cb){stopCam();var el=$("cam-reader");if(!el)return;camScanner=new Html5Qrcode("cam-reader");camScanner.start({facingMode:"environment"},{fps:10,qrbox:{width:240,height:240}},cb).catch(function(e){toast("Erro camera: "+e,"error")});}
function compressImg(file,cb){var r=new FileReader();r.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement("canvas"),max=1200,w=img.width,h=img.height;if(w>max){h=h*(max/w);w=max}if(h>max){w=w*(max/h);h=max}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);c.toBlob(function(blob){cb(blob)},"image/jpeg",0.6)};img.src=e.target.result};r.readAsDataURL(file);}
function uploadFoto(blob,name){return fetch(SB+"/storage/v1/object/fotos/"+name,{method:"POST",headers:{"apikey":SK,"Authorization":"Bearer "+SK},body:blob}).then(function(){return SB+"/storage/v1/object/public/fotos/"+name});}
function sendEmail(tipo,resp,data,operador,equipList,obs,toEmail){if(!toEmail)return;emailjs.send(EJS_SVC,EJS_TPL,{to_email:toEmail,tipo:tipo,responsavel:resp,data:data,operador:operador,equipamentos:equipList,observacoes:obs||"Nenhuma"},EJS_KEY).then(function(){toast("Comprovante enviado!")}).catch(function(){toast("Erro email","error")});}

/* ── TEMA / CORES ── */
function loadSavedColors(){
  try{var s=JSON.parse(localStorage.getItem("assetexp_theme")||"{}");if(s.ac)applyColors(s.ac,s.ac2,s.ac3)}catch(e){}
}
function applyColors(ac,ac2,ac3){
  var r=document.documentElement;
  r.style.setProperty("--ac",ac);
  r.style.setProperty("--ac2",ac2||ac);
  r.style.setProperty("--ac3",ac3||ac);
  var h=ac.replace("#","");
  var rv=parseInt(h.substring(0,2),16),gv=parseInt(h.substring(2,4),16),bv=parseInt(h.substring(4,6),16);
  r.style.setProperty("--acg","rgba("+rv+","+gv+","+bv+",.22)");
  r.style.setProperty("--acs","rgba("+rv+","+gv+","+bv+",.10)");
  r.style.setProperty("--bdf","rgba("+rv+","+gv+","+bv+",.45)");
}

window._usrModal=null;
function openUsrModal(id){
  var u=id?state.usuarios.find(function(x){return x.id===id}):null;
  window._usrModal=u?Object.assign({},u):{nome:"",cpf_ou_matricula:"",telefone:"",email:"",setor:"",perfil:"operador",status:"ativo",foto_url:""};
  showUsrModal();
}
function showUsrModal(){
  var f=window._usrModal,isEdit=!!f.id;
  var initials=getInitials(f.nome||"?");
  var avatarHtml=f.foto_url?'<img src="'+f.foto_url+'" alt="foto">':initials;
  var m='<div class="overlay" id="usr-overlay" onclick="if(event.target===this)closeUsrModal()"><div class="modal">'+
    '<div class="modal-hdr"><span class="modal-ttl">'+(isEdit?"Editar":"Novo")+' Usuario</span><button class="modal-cls" onclick="closeUsrModal()">✕</button></div>'+
    '<div class="avatar-wrap">'+
      '<div class="avatar-big" onclick="document.getElementById(\'av-input\').click()">'+avatarHtml+'<div class="avatar-edit-ov">📷</div></div>'+
      '<input type="file" id="av-input" accept="image/*" style="display:none" onchange="handleAvatarChange(event,\''+f.id+'\')">'+
      '<div class="avatar-hint">Clique para alterar foto de perfil</div>'+
    '</div>'+
    '<div class="field"><label class="lbl">Nome *</label><input id="uf-nome" value="'+(f.nome||"")+'"></div>'+
    '<div class="g2"><div class="field"><label class="lbl">CPF/Matricula</label><input id="uf-cpf" value="'+(f.cpf_ou_matricula||"")+'"></div><div class="field"><label class="lbl">Telefone</label><input id="uf-tel" value="'+(f.telefone||"")+'"></div></div>'+
    '<div class="field"><label class="lbl">E-mail * (usado no login)</label><input id="uf-email" value="'+(f.email||"")+'"></div>'+
    '<div class="field"><label class="lbl">Senha '+(isEdit?"(deixe vazio para manter)":"*")+'</label><input id="uf-senha" type="password" placeholder="'+(isEdit?"Nova senha...":"Criar senha")+'"></div>'+
    '<div class="g2"><div class="field"><label class="lbl">Setor</label><input id="uf-setor" value="'+(f.setor||"")+'"></div>'+
    '<div class="field"><label class="lbl">Perfil</label><select id="uf-perfil"><option value="admin"'+(f.perfil==="admin"?" selected":"")+'>Admin</option><option value="operador"'+(f.perfil==="operador"?" selected":"")+'>Operador</option><option value="visualizador"'+(f.perfil==="visualizador"?" selected":"")+'>Visualizador</option></select></div></div>'+
    '<div class="flex" style="justify-content:flex-end;margin-top:14px"><button class="btn btn-s" onclick="closeUsrModal()">Cancelar</button><button class="btn" onclick="saveUsr()">Salvar</button></div>'+
    '</div></div>';
  document.body.insertAdjacentHTML("beforeend",m);
}
function closeUsrModal(){var o=$("usr-overlay");if(o)o.remove()}
function handleAvatarChange(event,userId){
  var file=event.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){toast("Imagem muito grande (max 2MB)","error");return}
  var r=new FileReader();
  r.onload=function(e){
    var imgs=document.querySelectorAll(".avatar-big");
    imgs.forEach(function(el){el.innerHTML='<img src="'+e.target.result+'" alt="foto"><div class="avatar-edit-ov">📷</div>'});
    if(userId){
      compressImg(file,function(blob){
        var name="avatar_"+userId+"_"+Date.now()+".jpg";
        uploadFoto(blob,name).then(function(url){
          return api("usuarios?id=eq."+userId,"PATCH",{foto_url:url}).then(function(){
            var u=state.usuarios.find(function(x){return x.id===userId});if(u)u.foto_url=url;
            if(state.user&&state.user.id===userId)state.user.foto_url=url;
            toast("Foto atualizada!");
          });
        }).catch(function(){toast("Erro no upload","error")});
      });
    }else{window._usrModal.foto_url="pendente:"+e.target.result}
  };
  r.readAsDataURL(file);
}
function saveUsr(){
  var f=window._usrModal,senha=$("uf-senha")?$("uf-senha").value:"";
  var data={nome:$("uf-nome").value,cpf_ou_matricula:$("uf-cpf").value,telefone:$("uf-tel").value,email:$("uf-email").value,setor:$("uf-setor").value,perfil:$("uf-perfil").value,status:f.status||"ativo"};
  if(!data.nome||!data.email){toast("Preencha nome e email","error");return}
  if(!f.id&&!senha){toast("Crie uma senha","error");return}
  if(senha)data.senha_hash=senha;
  if(f.id){api("usuarios?id=eq."+f.id,"PATCH",Object.assign(data,{updated_at:now()})).then(function(){return addLog("Edicao","usuarios",f.id,data.nome)}).then(function(){toast("Atualizado!");closeUsrModal();return loadAll()}).then(render).catch(function(e){toast("Erro: "+e.message,"error")})}
  else{api("usuarios","POST",Object.assign(data,{created_at:now()})).then(function(){return addLog("Cadastro","usuarios",null,data.nome)}).then(function(){toast("Cadastrado!");closeUsrModal();return loadAll()}).then(render).catch(function(e){toast("Erro: "+e.message,"error")})}
}

/* ── CONFIGURACOES (admin) ── */

  var saved={};try{saved=JSON.parse(localStorage.getItem("assetexp_theme")||"{}")}catch(e){}
  var ac=saved.ac||"#C8102E",ac2=saved.ac2||"#8B0000",ac3=saved.ac3||"#E8314F";
  var presets=[
    {n:"Crimson",  a:"#C8102E",b:"#8B0000",c:"#E8314F"},
    {n:"Cobalto",  a:"#1D4ED8",b:"#1e3a8a",c:"#3b82f6"},
    {n:"Esmeralda",a:"#059669",b:"#064e3b",c:"#10b981"},
    {n:"Ambar",    a:"#D97706",b:"#92400e",c:"#F59E0B"},
    {n:"Violeta",  a:"#7C3AED",b:"#4c1d95",c:"#8b5cf6"},
    {n:"Rose",     a:"#DB2777",b:"#831843",c:"#ec4899"}
  ];
  return '<div style="max-width:640px">'+
    '<div class="color-panel">'+
      '<div class="color-panel-ttl">🎨 Personalizar Cores do Sistema</div>'+
      '<p style="color:var(--t3);font-size:13px;margin-bottom:18px">Altere as cores de destaque do AssetExp. Afeta todos os usuarios.</p>'+
      '<label class="lbl" style="margin-bottom:10px">Temas prontos</label>'+
      '<div class="preset-row">'+presets.map(function(p){return '<button class="preset-btn" onclick="applyPreset(\''+p.a+'\',\''+p.b+'\',\''+p.c+'\')"><span class="preset-dot" style="background:'+p.a+'"></span>'+p.n+'</button>'}).join("")+'</div>'+
      '<label class="lbl" style="margin-bottom:10px">Personalizado</label>'+
      '<div class="color-grid">'+
        '<div><div class="color-item-lbl">Cor Principal</div><div class="color-row"><input type="color" class="color-swatch" id="cp-ac" value="'+ac+'" oninput="syncHex(\'ac\',this.value)"><input type="text" class="color-hex" id="ch-ac" value="'+ac.toUpperCase()+'" maxlength="7" oninput="syncSwatch(\'ac\',this.value)"></div></div>'+
        '<div><div class="color-item-lbl">Cor Escura</div><div class="color-row"><input type="color" class="color-swatch" id="cp-ac2" value="'+ac2+'" oninput="syncHex(\'ac2\',this.value)"><input type="text" class="color-hex" id="ch-ac2" value="'+ac2.toUpperCase()+'" maxlength="7" oninput="syncSwatch(\'ac2\',this.value)"></div></div>'+
        '<div><div class="color-item-lbl">Cor Clara</div><div class="color-row"><input type="color" class="color-swatch" id="cp-ac3" value="'+ac3+'" oninput="syncHex(\'ac3\',this.value)"><input type="text" class="color-hex" id="ch-ac3" value="'+ac3.toUpperCase()+'" maxlength="7" oninput="syncSwatch(\'ac3\',this.value)"></div></div>'+
      '</div>'+
      '<div class="color-actions">'+
        '<button class="btn btn-s" onclick="resetColors()">Restaurar Padrao</button>'+
        '<button class="btn" onclick="saveColors()">💾 Salvar Cores</button>'+
      '</div>'+
    '</div>'+
    '<div class="card"><div style="font-family:\'Syne\',sans-serif;font-size:14px;font-weight:700;color:var(--t1);margin-bottom:12px">ℹ️ Informacoes do Sistema</div>'+
    '<div style="font-size:13px;color:var(--t3);line-height:2">'+
      '<div>Sistema: <span style="color:var(--t2)">AssetExp v1.0</span></div>'+
      '<div>Banco de dados: <span style="color:var(--t2)">Supabase (PostgreSQL)</span></div>'+
      '<div>Hospedagem: <span style="color:var(--t2)">GitHub Pages</span></div>'+
      '<div>Usuarios cadastrados: <span style="color:var(--t2)">'+state.usuarios.length+'</span></div>'+
      '<div>Equipamentos: <span style="color:var(--t2)">'+state.equipamentos.length+'</span></div>'+
    '</div></div>'+
  '</div>';
}

/* ── HISTORICO ── */
function renderHist(){
  var mv=state.movs,us=state.usuarios;
  var h='<div class="flex wrap" style="margin-bottom:14px">'+
    '<select id="hi-filter" style="width:auto;min-width:110px" onchange="render()"><option value="todos">Todos</option><option value="aberto">Em aberto</option><option value="parcial">Parcial</option><option value="concluida">Concluida</option></select>'+
    '<select id="hi-user" style="width:auto;min-width:130px" onchange="render()"><option value="">Todos usuarios</option>'+us.map(function(u){return '<option value="'+u.id+'">'+u.nome+'</option>'}).join("")+'</select>'+
    '<input id="hi-de" type="date" style="width:auto" onchange="render()">'+
    '<input id="hi-ate" type="date" style="width:auto" onchange="render()">'+
  '</div>';
  var fs=$("hi-filter")?$("hi-filter").value:"todos",fu=$("hi-user")?$("hi-user").value:"",de=$("hi-de")?$("hi-de").value:"",ate=$("hi-ate")?$("hi-ate").value:"";
  var fl=mv.filter(function(m){var ok=fs==="todos"||m.status===fs;if(fu)ok=ok&&m.responsavel_id===fu;if(de)ok=ok&&m.data_saida>=de;if(ate)ok=ok&&m.data_saida<=ate+"T23:59:59";return ok});
  if(!fl.length){h+='<div class="card"><p style="color:var(--t3);font-size:13px;text-align:center;padding:8px 0">Nenhuma movimentacao encontrada</p></div>';return h}
  fl.forEach(function(m){
    var r=us.find(function(u){return u.id===m.responsavel_id}),op=us.find(function(u){return u.id===m.operador_id}),mi=state.itens.filter(function(i){return i.movimentacao_id===m.id});
    h+='<div class="card" style="padding:0;margin-bottom:10px">'+
      '<div style="padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="toggleHist(\''+m.id+'\')">'+
        '<div><div style="font-weight:500;color:var(--t1);font-size:14px">'+(r?r.nome:"--")+' <span style="color:var(--t3);font-size:12px">'+mi.length+' item(ns)</span></div>'+
        '<div style="color:var(--t3);font-size:12px;margin-top:3px">Saida: '+fmtdt(m.data_saida)+(m.data_fechamento?" | Devol: "+fmtdt(m.data_fechamento):"")+(op?" | "+op.nome.split(" ")[0]:"")+'</div></div>'+
        badge(m.status)+
      '</div>'+
      '<div id="hi-'+m.id+'" style="display:none;padding:0 16px 14px;border-top:1px solid var(--bd)">';
    if(m.observacoes){var obsText=m.observacoes.replace(/foto:https?:\/\/[^\s|]+/g,"").replace(/\|/g," ").trim();if(obsText)h+='<p style="color:var(--t3);font-size:12px;margin:10px 0 6px">Obs: '+obsText+'</p>'}
    mi.forEach(function(i){
      var eq=state.equipamentos.find(function(e){return e.id===i.equipamento_id});
      h+='<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">'+
        '<div style="display:flex;justify-content:space-between;font-size:12px">'+
          '<span style="color:var(--t1)">'+(eq?eq.nome:"?")+'<span style="color:var(--t3);margin-left:6px">'+(eq?eq.codigo_interno:"")+'</span></span>'+
          '<span style="color:'+(i.data_devolucao?"var(--green)":"var(--amber)")+'">'+(i.data_devolucao?"✓ Dev. "+fmtd(i.data_devolucao):"Pendente")+'</span>'+
        '</div>';
      var itemObs=i.observacao_item||"";var fotoMatches=itemObs.match(/foto:(https?:\/\/[^\s]+)/g);
      if(fotoMatches){h+='<div class="foto-grid">';fotoMatches.forEach(function(fm){var url=fm.replace("foto:","");h+='<a href="'+url+'" target="_blank"><img src="'+url+'" class="foto-thumb" title="Ver foto"></a>'});h+='</div>'}
      var obsMatches=(m.observacoes||"").match(/foto:(https?:\/\/[^\s|]+)/g);
      if(obsMatches&&!fotoMatches){h+='<div class="foto-grid">';obsMatches.forEach(function(fm){var url=fm.replace("foto:","");if(url.indexOf(i.equipamento_id)>=0){h+='<a href="'+url+'" target="_blank"><img src="'+url+'" class="foto-thumb" title="Ver foto"></a>'}});h+='</div>'}
      h+='</div>';
    });
    h+="</div></div>";
  });
  return h;
}
function toggleHist(id){var el=$("hi-"+id);if(el)el.style.display=el.style.display==="none"?"block":"none"}
